# Render Blueprint for Meridian backends.
# Frontend deploys to Vercel separately (see frontend/vercel.json).
# Managed data services are external: Supabase (Postgres), Upstash (Redis),
# Qdrant Cloud (vectors). Set their connection strings as env vars below.
#
# PLANS: both services are on the FREE plan (no charge).
#   - Free services have 512 MB RAM and SPIN DOWN after ~15 min idle, so the
#     first request after idle is slow (cold start ~30-60s). Fine for a demo.
#   - A card on file is required by Render to use Blueprints, but you are NOT
#     charged while everything stays on "plan: free".
#   - The backend-ai image skips local Chromium (Scraping Browser uses Bright
#     Data's REMOTE browser over CDP), keeping it within the 512 MB limit.
services:
  # --- Backend (Hono REST API) ---
  - type: web
    name: meridian-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_AI_URL
        sync: false
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "443"
      - key: MINIO_USE_SSL
        value: "true"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: meridian-evidence
      - key: MINIO_REGION
        value: us-east-1

  # --- Backend AI (FastAPI + LangGraph) ---
  - type: web
    name: meridian-backend-ai
    runtime: docker
    dockerfilePath: ./backend-ai/Dockerfile
    dockerContext: ./backend-ai
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8001"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: AIMLAPI_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: SPEECHMATICS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
